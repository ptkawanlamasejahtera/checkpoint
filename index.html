<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Checkpoint Armada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#1E2A33;
    --steel:#3C4F5E;
    --fog:#E7ECF0;
    --card:#FFFFFF;
    --line:#D3DBE1;
    --amber:#E8A33D;
    --amber-dark:#C6822A;
    --ink:#17222B;
    --muted:#6B7B87;
    --danger:#C0463A;
    --ok:#2E8B57;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--fog);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    -webkit-tap-highlight-color:transparent;
    padding-bottom:110px;
  }
  /* HEADER */
  .header{
    background:linear-gradient(160deg,var(--asphalt) 0%, var(--steel) 100%);
    padding:22px 20px 26px;
    color:#fff;
    position:relative;
    overflow:hidden;
  }
  .stripe-band{
    position:absolute; top:0; left:0; right:0; height:6px;
    background:repeating-linear-gradient(135deg,var(--amber) 0 14px, var(--asphalt) 14px 28px);
  }
  .eyebrow{
    font-family:'Space Grotesk',sans-serif;
    font-size:11px; letter-spacing:.18em; font-weight:600;
    color:var(--amber); text-transform:uppercase; margin:10px 0 4px;
  }
  .title{
    font-family:'Space Grotesk',sans-serif;
    font-size:26px; font-weight:700; margin:0 0 6px; letter-spacing:-0.01em;
  }
  .subtitle{
    font-size:13px; color:#B9C6CE; font-family:'JetBrains Mono',monospace;
  }

  .wrap{ padding:16px 16px 0; max-width:520px; margin:0 auto; }

  .section-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    color:var(--steel); margin:22px 4px 8px;
    display:flex; align-items:center; gap:8px;
  }
  .section-title::before{
    content:''; width:14px; height:2px; background:var(--amber); display:inline-block;
  }

  .card{
    background:var(--card);
    border-radius:14px;
    border:1px solid var(--line);
    padding:16px;
    box-shadow:0 1px 2px rgba(23,34,43,0.04);
  }
  .card + .card{ margin-top:12px; }

  .field{ margin-bottom:16px; }
  .field:last-child{ margin-bottom:0; }
  label{
    display:block; font-size:12.5px; font-weight:600; color:var(--muted);
    margin-bottom:7px;
  }
  label .req{ color:var(--amber-dark); }

  input[type="text"], input[type="date"], input[type="time"]{
    width:100%; padding:12px 13px; font-size:15px; font-family:'Inter',sans-serif;
    border:1.5px solid var(--line); border-radius:10px; background:#fff; color:var(--ink);
    outline:none;
  }
  input[type="text"]:focus, input[type="date"]:focus, input[type="time"]:focus{
    border-color:var(--steel);
  }
  input[type="text"].upper{ text-transform:uppercase; letter-spacing:.03em; font-family:'JetBrains Mono',monospace; }

  /* ID badge - ticket stub look */
  .id-badge{
    display:flex; align-items:center; justify-content:space-between;
    border:1.5px dashed var(--line); border-radius:10px; padding:12px 14px;
    background:repeating-linear-gradient(135deg, #FAFBFC 0 10px, #F4F6F8 10px 20px);
  }
  .id-badge .val{
    font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:700; letter-spacing:.05em; color:var(--asphalt);
  }
  .id-badge .tag{
    font-size:10px; font-weight:700; letter-spacing:.1em; color:#fff; background:var(--steel);
    padding:3px 8px; border-radius:5px; text-transform:uppercase;
  }

  /* number stepper */
  .stepper{
    display:flex; align-items:center; border:1.5px solid var(--line); border-radius:10px; overflow:hidden;
  }
  .stepper button{
    width:46px; height:46px; border:none; background:#F1F4F6; font-size:20px; color:var(--steel);
    font-weight:700; cursor:pointer; flex-shrink:0;
  }
  .stepper button:active{ background:var(--line); }
  .stepper input{
    flex:1; border:none; text-align:center; font-family:'JetBrains Mono',monospace;
    font-size:17px; font-weight:700; padding:12px 4px; outline:none; color:var(--ink); min-width:0;
  }

  /* toggle buttons */
  .toggle-row{ display:flex; gap:10px; }
  .toggle-btn{
    flex:1; padding:13px 8px; text-align:center; border-radius:10px;
    border:1.5px solid var(--line); background:#fff; font-weight:600; font-size:13.5px;
    color:var(--muted); cursor:pointer; letter-spacing:.03em;
  }
  .toggle-btn.active{
    border-color:var(--amber-dark); background:var(--amber); color:#fff;
    box-shadow:0 2px 6px rgba(198,130,42,0.35);
  }
  .toggle-btn.active.neg{ background:var(--steel); border-color:var(--steel); color:#fff; box-shadow:none; }

  /* photo box */
  .photo-box{
    position:relative; border:1.5px dashed var(--line); border-radius:10px;
    height:120px; display:flex; align-items:center; justify-content:center;
    background:#F8FAFB; overflow:hidden; cursor:pointer;
  }
  .photo-box.filled{ border-style:solid; border-color:var(--ok); }
  .photo-box img{ width:100%; height:100%; object-fit:cover; }
  .photo-box .placeholder{ color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:6px; font-size:12px; }
  .photo-box input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .photo-box .badge-ok{
    position:absolute; top:6px; right:6px; background:var(--ok); color:#fff;
    font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px;
  }

  .time-row{ display:flex; gap:10px; }
  .time-row .field{ flex:1; }

  /* submit bar - barrier gate */
  .submit-bar{
    position:fixed; left:0; right:0; bottom:0; padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(231,236,240,0) 0%, var(--fog) 30%);
  }
  #submit-btn{
    width:100%; max-width:520px; margin:0 auto; display:flex; align-items:center; justify-content:center; gap:10px;
    padding:16px; border:none; border-radius:12px; cursor:pointer;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; letter-spacing:.04em;
    color:#1A1400; text-transform:uppercase;
    background:repeating-linear-gradient(135deg, var(--amber) 0 16px, var(--asphalt) 16px 32px);
    background-size:200% 200%;
    box-shadow:0 6px 16px rgba(30,42,51,0.28);
    transition:transform .15s ease;
  }
  #submit-btn span.gate-text{ color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.3); }
  #submit-btn:active{ transform:scale(0.98); }
  #submit-btn:disabled{ opacity:0.75; cursor:default; }
  .spinner{
    width:16px; height:16px; border:2.5px solid rgba(255,255,255,0.4); border-top-color:#fff;
    border-radius:50%; display:inline-block; animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* toast */
  #toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-120%);
    background:var(--ink); color:#fff; padding:12px 20px; border-radius:10px; font-size:14px; font-weight:600;
    z-index:100; transition:transform .3s ease; box-shadow:0 8px 20px rgba(0,0,0,.25); max-width:88%; text-align:center;
  }
  #toast.show{ transform:translateX(-50%) translateY(0); }
  #toast.error{ background:var(--danger); }
  #toast.success{ background:var(--ok); }

  /* failed-submission banner */
  #fail-banner{
    max-width:520px; margin:0 auto; padding:0 16px;
  }
  .fail-card{
    background:#FDECEA; border:1.5px solid var(--danger); border-radius:12px;
    padding:12px 14px; margin-top:12px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .fail-card .info{ font-size:12.5px; color:var(--danger); line-height:1.4; }
  .fail-card .info b{ display:block; font-family:'JetBrains Mono',monospace; font-size:13px; }
  .fail-card button{
    flex-shrink:0; border:none; background:var(--danger); color:#fff; font-weight:700;
    font-size:12.5px; padding:9px 13px; border-radius:8px; cursor:pointer;
  }
  .fail-card button:disabled{ opacity:.6; }

  /* nopol autocomplete */
  .suggest-list{
    position:absolute; left:0; right:0; top:100%; margin-top:4px;
    background:#fff; border:1.5px solid var(--line); border-radius:10px;
    max-height:230px; overflow-y:auto; z-index:20;
    box-shadow:0 10px 24px rgba(23,34,43,0.14);
    display:none;
  }
  .suggest-list.show{ display:block; }
  .suggest-item{ padding:10px 13px; cursor:pointer; border-bottom:1px solid var(--line); }
  .suggest-item:last-child{ border-bottom:none; }
  .suggest-item:active{ background:#F1F4F6; }
  .suggest-item .s-nopol{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; color:var(--ink); }
  .suggest-item .s-meta{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .suggest-empty{ padding:12px 13px; font-size:12px; color:var(--muted); }

  .armada-chips{ display:flex; gap:8px; }
  .chip{ flex:1; background:#F1F4F6; border-radius:9px; padding:8px 10px; text-align:center; min-width:0; }
  .chip-label{ display:block; font-size:9.5px; letter-spacing:.08em; color:var(--muted); text-transform:uppercase; font-weight:700; margin-bottom:2px; }
  .chip-val{ display:block; font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:700; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
</head>
<body>

<div class="header">
  <div class="stripe-band"></div>
  <div class="eyebrow">Log Patroli · Pos Keamanan</div>
  <div class="title">Checkpoint Armada</div>
  <div class="subtitle" id="header-datetime">--</div>
</div>

<div id="fail-banner"></div>

<div class="wrap">

  <div class="section-title">Identitas</div>
  <div class="card">
    <div class="field">
      <label>ID Checkpoint</label>
      <div class="id-badge">
        <span class="val" id="id-value">------</span>
        <span class="tag">Auto</span>
      </div>
    </div>
    <div class="field">
      <label>Tanggal <span class="req">*</span></label>
      <input type="date" id="tanggal" required>
    </div>
    <div class="field" style="position:relative;">
      <label>Nopol <span class="req">*</span></label>
      <input type="text" id="nopol" class="upper" placeholder="Ketik nopol… cth. A8373WX" autocomplete="off" required>
      <div id="nopol-suggest" class="suggest-list"></div>
    </div>
    <div class="field" id="armada-info" style="display:none; margin-bottom:0;">
      <label>Info Armada</label>
      <div class="armada-chips">
        <div class="chip"><span class="chip-label">Kode</span><span class="chip-val" id="info-kode">-</span></div>
        <div class="chip"><span class="chip-label">Type</span><span class="chip-val" id="info-type">-</span></div>
        <div class="chip"><span class="chip-label">BU</span><span class="chip-val" id="info-bu">-</span></div>
      </div>
    </div>
  </div>

  <div class="section-title">Odometer</div>
  <div class="card">
    <div class="field">
      <label>KM Check Point <span class="req">*</span></label>
      <div class="stepper">
        <button type="button" onclick="stepKm(-1)">−</button>
        <input type="text" inputmode="numeric" id="km" value="0">
        <button type="button" onclick="stepKm(1)">+</button>
      </div>
    </div>
    <div class="field">
      <label>Foto KM <span class="req">*</span></label>
      <div class="photo-box" id="box-km" onclick="document.getElementById('file-km').click()">
        <div class="placeholder" id="ph-km">📷<span>Ambil foto odometer</span></div>
        <img id="img-km" style="display:none">
        <input type="file" id="file-km" accept="image/*" capture="environment" onchange="handlePhoto(this,'km')">
      </div>
    </div>
  </div>

  <div class="section-title">BBM</div>
  <div class="card">
    <div class="field">
      <label>Status BBM <span class="req">*</span></label>
      <div class="toggle-row">
        <div class="toggle-btn" id="bbm-full" onclick="selectToggle('bbm','full')">FULL</div>
        <div class="toggle-btn" id="bbm-tidak" onclick="selectToggle('bbm','tidak')">TIDAK FULL</div>
      </div>
    </div>
    <div class="field">
      <label>Foto BBM <span class="req">*</span></label>
      <div class="photo-box" id="box-bbm" onclick="document.getElementById('file-bbm').click()">
        <div class="placeholder" id="ph-bbm">📷<span>Ambil foto indikator BBM</span></div>
        <img id="img-bbm" style="display:none">
        <input type="file" id="file-bbm" accept="image/*" capture="environment" onchange="handlePhoto(this,'bbm')">
      </div>
    </div>
  </div>

  <div class="section-title">Rekomendasi</div>
  <div class="card">
    <div class="field" style="margin-bottom:0;">
      <label>Suggest <span class="req">*</span></label>
      <div class="toggle-row">
        <div class="toggle-btn" id="suggest-cuci" onclick="selectToggle('suggest','cuci')">CUCI</div>
        <div class="toggle-btn" id="suggest-tidak" onclick="selectToggle('suggest','tidak')">TIDAK CUCI</div>
      </div>
    </div>
  </div>

  <div class="section-title">Waktu</div>
  <div class="card">
    <div class="time-row">
      <div class="field">
        <label>Start</label>
        <input type="time" id="start">
      </div>
      <div class="field">
        <label>Finish</label>
        <input type="time" id="finish">
      </div>
    </div>
  </div>

</div>

<div class="submit-bar">
  <button id="submit-btn" onclick="submitForm()">
    <span class="gate-text">✓ &nbsp;Simpan Checklist</span>
  </button>
</div>

<div id="toast"></div>

<script>
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbw6DiaVhu271xyOOIs6sFDxYPuZlOdCwXdNSOdb3awWpg4KywX9RKyPtvCdsG8GmiH0/exec';

  // ---- ID & date/time init ----
  function genId(){
    return Array.from({length:8}, () => "0123456789abcdef"[Math.floor(Math.random()*16)]).join('');
  }
  document.getElementById('id-value').textContent = genId();

  function pad(n){ return n.toString().padStart(2,'0'); }
  const now = new Date();
  document.getElementById('tanggal').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('header-datetime').textContent =
    `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} · ${pad(now.getHours())}:${pad(now.getMinutes())}`;

  // ---- KM stepper ----
  function stepKm(dir){
    const el = document.getElementById('km');
    let v = parseInt(el.value || '0', 10) + dir;
    if (v < 0) v = 0;
    el.value = v;
  }
  document.getElementById('km').addEventListener('input', function(){
    this.value = this.value.replace(/[^0-9]/g,'');
  });

  // ---- master armada: autocomplete nopol -> kode/type/bu ----
  let masterArmada = [];
  let selectedArmada = null;
  const nopolInput = document.getElementById('nopol');
  const suggestBox = document.getElementById('nopol-suggest');
  const armadaInfoBox = document.getElementById('armada-info');

  async function loadMasterArmada(){
    try {
      const res = await fetch(scriptUrl + '?action=master');
      const data = await res.json();
      if (Array.isArray(data)) masterArmada = data;
    } catch (err) {
      // offline or blocked — form still works, just falls back to manual nopol entry
      console.warn('Gagal memuat master armada:', err);
    }
  }
  loadMasterArmada();

  function renderSuggestions(query){
    if (!query){ suggestBox.classList.remove('show'); return; }
    if (masterArmada.length === 0){
      suggestBox.innerHTML = '<div class="suggest-empty">Master armada belum termuat — bisa lanjut ketik manual</div>';
      suggestBox.classList.add('show');
      return;
    }
    const matches = masterArmada.filter(m => m.nopol.includes(query)).slice(0, 6);
    if (matches.length === 0){
      suggestBox.innerHTML = '<div class="suggest-empty">Nopol tidak ada di master — lanjut input manual</div>';
    } else {
      suggestBox.innerHTML = matches.map(m => `
        <div class="suggest-item" onmousedown="selectArmada('${m.nopol}')">
          <div class="s-nopol">${m.nopol}</div>
          <div class="s-meta">${m.kode || '-'} · ${m.type || '-'} · ${m.bu || '-'}</div>
        </div>
      `).join('');
    }
    suggestBox.classList.add('show');
  }

  nopolInput.addEventListener('input', function(){
    this.value = this.value.toUpperCase();
    selectedArmada = null;
    armadaInfoBox.style.display = 'none';
    renderSuggestions(this.value.trim());
  });
  nopolInput.addEventListener('focus', function(){
    if (this.value.trim()) renderSuggestions(this.value.trim());
  });
  nopolInput.addEventListener('blur', function(){
    setTimeout(() => {
      suggestBox.classList.remove('show');
      if (this.value.trim() && !selectedArmada){
        document.getElementById('info-kode').textContent = '-';
        document.getElementById('info-type').textContent = '-';
        document.getElementById('info-bu').textContent = '-';
        armadaInfoBox.style.display = 'block';
      }
    }, 150);
  });

  function selectArmada(nopolVal){
    const item = masterArmada.find(m => m.nopol === nopolVal);
    if (!item) return;
    nopolInput.value = item.nopol;
    selectedArmada = item;
    document.getElementById('info-kode').textContent = item.kode || '-';
    document.getElementById('info-type').textContent = item.type || '-';
    document.getElementById('info-bu').textContent = item.bu || '-';
    armadaInfoBox.style.display = 'block';
    suggestBox.classList.remove('show');
  }

  // ---- toggles ----
  const state = { bbm:null, suggest:null };
  function selectToggle(group, value){
    state[group] = value;
    document.querySelectorAll(`.toggle-btn`).forEach(b=>{
      if (b.id.startsWith(group+'-')) b.classList.remove('active','neg');
    });
    const idMap = {
      bbm:{full:'bbm-full', tidak:'bbm-tidak'},
      suggest:{cuci:'suggest-cuci', tidak:'suggest-tidak'}
    };
    const activeEl = document.getElementById(idMap[group][value]);
    activeEl.classList.add('active');
    if (value === 'tidak') activeEl.classList.add('neg');
  }

  // ---- photo capture + compression ----
  const photos = {};
  function compressImage(file, maxWidth, quality, callback){
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxWidth){ h = h * (maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
  function handlePhoto(input, key){
    const file = input.files[0];
    if (!file) return;
    compressImage(file, 700, 0.45, dataUrl => {
      photos[key] = dataUrl;
      const img = document.getElementById('img-'+key);
      const ph = document.getElementById('ph-'+key);
      const box = document.getElementById('box-'+key);
      img.src = dataUrl;
      img.style.display = 'block';
      ph.style.display = 'none';
      box.classList.add('filled');
      if (!box.querySelector('.badge-ok')){
        const badge = document.createElement('div');
        badge.className = 'badge-ok';
        badge.textContent = '✓';
        box.appendChild(badge);
      }
    });
  }

  // ---- toast ----
  function showToast(msg, type){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (type || '');
    setTimeout(()=>{ t.className = t.className.replace('show',''); }, 3200);
  }

  // ---- submit (optimistic: instant "saved" feedback, send happens in background) ----
  const failedItems = {}; // key -> { payload, label }

  function submitForm(){
    const tanggal = document.getElementById('tanggal').value;
    const nopol = document.getElementById('nopol').value.trim();
    const km = document.getElementById('km').value;
    const start = document.getElementById('start').value;
    const finish = document.getElementById('finish').value;
    const id = document.getElementById('id-value').textContent;

    if (!tanggal || !nopol){
      showToast('Lengkapi Tanggal & Nopol dulu ya', 'error'); return;
    }
    if (!state.bbm){ showToast('Pilih status BBM dulu', 'error'); return; }
    if (!state.suggest){ showToast('Pilih rekomendasi Suggest dulu', 'error'); return; }
    if (!photos.km){ showToast('Foto KM wajib diisi', 'error'); return; }
    if (!photos.bbm){ showToast('Foto BBM wajib diisi', 'error'); return; }

    const payload = {
      id, tanggal, nopol, km,
      kode_armada: selectedArmada ? selectedArmada.kode : '-',
      type_armada: selectedArmada ? selectedArmada.type : '-',
      bu: selectedArmada ? selectedArmada.bu : '-',
      bbm: state.bbm === 'full' ? 'FULL' : 'TIDAK FULL',
      suggest: state.suggest === 'cuci' ? 'CUCI' : 'TIDAK CUCI',
      start, finish,
      foto_km: photos.km,
      foto_bbm: photos.bbm
    };

    // brief lock just to prevent accidental double-tap, not to wait on network
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    setTimeout(() => { btn.disabled = false; }, 600);

    showToast('✓ Tersimpan — ' + nopol, 'success');
    resetFormForNext();

    sendInBackground(payload, id + '-' + Date.now());
  }

  function sendInBackground(payload, key){
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 25000);
    fetch(scriptUrl, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    }).then(() => {
      clearTimeout(timeoutId);
      // no-cors gives no readable status, but a resolved promise means the
      // request actually reached the network layer without erroring out.
    }).catch(err => {
      clearTimeout(timeoutId);
      failedItems[key] = { payload, label: payload.nopol + ' · ' + payload.tanggal + (payload.km ? ' · ' + payload.km + ' km' : '') };
      renderFailBanner();
      showToast('⚠ Gagal kirim data ' + payload.nopol + ' — cek pita merah di atas', 'error');
    });
  }

  function renderFailBanner(){
    const el = document.getElementById('fail-banner');
    const keys = Object.keys(failedItems);
    if (keys.length === 0){ el.innerHTML = ''; return; }
    el.innerHTML = keys.map(key => `
      <div class="fail-card">
        <div class="info">Gagal terkirim<b>${failedItems[key].label}</b></div>
        <button onclick="retryItem('${key}')">Kirim Ulang</button>
      </div>
    `).join('');
  }

  function retryItem(key){
    const item = failedItems[key];
    if (!item) return;
    const btns = document.querySelectorAll('#fail-banner button');
    btns.forEach(b => b.disabled = true);

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 25000);
    fetch(scriptUrl, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(item.payload),
      signal: controller.signal
    }).then(() => {
      clearTimeout(timeoutId);
      delete failedItems[key];
      renderFailBanner();
      showToast('✓ Berhasil dikirim ulang — ' + item.label, 'success');
    }).catch(() => {
      clearTimeout(timeoutId);
      showToast('Masih gagal. Cek koneksi lalu coba lagi.', 'error');
      renderFailBanner();
    });
  }

  // ---- reset fields for the next vehicle in line ----
  function resetFormForNext(){
    document.getElementById('id-value').textContent = genId();
    document.getElementById('nopol').value = '';
    document.getElementById('km').value = '0';
    document.getElementById('start').value = '';
    document.getElementById('finish').value = '';

    selectedArmada = null;
    document.getElementById('armada-info').style.display = 'none';
    document.getElementById('nopol-suggest').classList.remove('show');

    state.bbm = null; state.suggest = null;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active', 'neg'));

    ['km','bbm'].forEach(k => {
      delete photos[k];
      const img = document.getElementById('img-'+k);
      const ph = document.getElementById('ph-'+k);
      const box = document.getElementById('box-'+k);
      img.style.display = 'none';
      img.src = '';
      ph.style.display = 'flex';
      box.classList.remove('filled');
      const badge = box.querySelector('.badge-ok');
      if (badge) badge.remove();
      document.getElementById('file-'+k).value = '';
    });
  }
</script>
